<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Party — Shop</title>
  <meta name="description" content="Star Party Virtual Shop — Buy gems, loot boxes, skins, bundles and in-game items.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config={theme:{extend:{colors:{'sp':{'bg':'#0f1225','sidebar':'#161a35','panel':'#1e2348','card':'#272d5a','hover':'#313772','accent':'#4858a8','border':'#2a3060','gold':'#f5a623','green':'#2ed573','red':'#ff4757','purple':'#7c3aed','muted':'#6b7db3','label':'#8892b0'}},fontFamily:{'body':['Nunito','sans-serif']}}}}
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px}
    body{font-family:'Nunito',sans-serif;background:#0f1225;color:#fff;overflow-x:hidden;max-width:100vw}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#4858a8;border-radius:10px}

    .sidebar-link{transition:all .15s ease;border-radius:8px}
    .sidebar-link:hover{background:rgba(72,88,168,.2)}
    .sidebar-link.active{color:#7c9fff;font-weight:700}
    .nav-icon{width:22px;height:22px;object-fit:contain;border-radius:4px;flex-shrink:0}

    .img-card{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .25s ease,box-shadow .25s ease}
    .img-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
    .img-card img.cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
    .img-card:hover img.cover{transform:scale(1.08)}
    .img-card .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(15,18,37,.85) 0%,rgba(15,18,37,.3) 50%,transparent 100%)}

    .shop-tab{transition:all .2s ease;cursor:pointer}
    .shop-tab:hover{color:#fff;background:rgba(72,88,168,.2)}
    .shop-tab.active{color:#fff;background:rgba(124,58,237,.3);border-color:#7c3aed}

    .buy-btn{transition:all .15s ease}
    .buy-btn:hover{transform:scale(1.05);filter:brightness(1.15)}

    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .shimmer{background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.08) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 2.5s ease-in-out infinite}
    @keyframes pulse-glow{0%,100%{box-shadow:0 0 10px rgba(245,166,35,.3)}50%{box-shadow:0 0 25px rgba(245,166,35,.6),0 0 40px rgba(245,166,35,.2)}}
    .pulse-gold{animation:pulse-glow 2s ease-in-out infinite}
    @keyframes countdown-pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .countdown-blink{animation:countdown-pulse 1s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    .float-anim{animation:float 3s ease-in-out infinite}

    .hscroll{overflow-x:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
    .hscroll::-webkit-scrollbar{height:3px}
    .scroll-btn{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(15,18,37,.7);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:background .2s}
    .scroll-btn:hover{background:rgba(72,88,168,.6)}

    .ribbon{position:absolute;top:12px;right:-30px;z-index:10;padding:2px 30px;font-size:13px;font-weight:800;text-transform:uppercase;transform:rotate(45deg);letter-spacing:1px}

    .hamburger-btn{display:none}
    .sidebar-overlay{display:none}
    @media(max-width:1023px){
      .hamburger-btn{display:flex}
      #sidebar{transform:translateX(-100%);transition:transform .3s ease}
      #sidebar.open{transform:translateX(0)}
      .sidebar-overlay.open{display:block;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.5)}
      main{margin-left:0!important}
    }
  /* Layout Constants */
    .w-sidebar { width: var(--sidebar-w, 188px); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @media(max-width:1023px){
        .w-sidebar{width:0}
    }
    
    /* Collapsible Logic */
    body.sidebar-collapsed { --sidebar-w: 72px; }
    @media(max-width:1023px) { body.sidebar-collapsed { --sidebar-w: 0px; } }
    
    body.sidebar-collapsed .nav-text { opacity: 0; pointer-events: none; width: 0; overflow: hidden; display: none; }
    body.sidebar-collapsed .sidebar-banners-area { display: none; }
    body.sidebar-collapsed .sidebar-link { justify-content: center !important; padding-left: 0 !important; padding-right: 0 !important; }
    body.sidebar-collapsed .sidebar-link .nav-icon { margin-right: 0 !important; }
    body.sidebar-collapsed .sidebar-header { justify-content: center !important; padding-left: 0 !important; padding-right: 0 !important; }
  
  </style>
</head>
<body class="font-body">

  <div class="flex min-h-screen">
    <!-- SIDEBAR (same as index.html) -->

        </button>
      </div>
      <nav class="flex-1 overflow-y-auto px-1.5 py-2 text-[14px] space-y-[1px]" style="font-family: 'Horizontal', sans-serif;">
        <a href="index.html" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_home.png" alt="" class="nav-icon"><span class="nav-text">Home</span></a>
        <a href="game-info.html" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_game.png" alt="" class="nav-icon"><span class="nav-text">Games</span></a>
        <a href="character.html" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_Character.png" alt="" class="nav-icon"><span class="nav-text">Character</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon-gacha.png" alt="" class="nav-icon"><span class="nav-text">Gacha</span></a>
        <a href="shop.html" class="sidebar-link active flex items-center gap-3 px-3 py-[8px] bg-[#2a2d5e]/40 rounded-lg"><img src="./assets/images/icons/icon_Shop_o.png" alt="" class="nav-icon"><span class="nav-text">Shop</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_Rank.png" alt="" class="nav-icon"><span class="nav-text">Rank</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_StarCards.png" alt="" class="nav-icon"><span class="nav-text">StarCards</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_PlayGround.png" alt="" class="nav-icon"><span class="nav-text">Play Ground</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_DailyRewards.png" alt="" class="nav-icon"><span class="nav-text">Daily Rewards</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_RewardCenter.png" alt="" class="nav-icon"><span class="nav-text">Reward Center</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_Achievement.png" alt="" class="nav-icon"><span class="nav-text">Achievement</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_Inventory.png" alt="" class="nav-icon"><span class="nav-text">Inventory</span></a>
        
        <div class="h-[1px] w-[80%] mx-auto bg-white/10 my-1"></div>
        
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_Action.png" alt="" class="nav-icon"><span class="nav-text">Action</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_Match.png" alt="" class="nav-icon"><span class="nav-text">Match</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_Puzzle.png" alt="" class="nav-icon"><span class="nav-text">Puzzle</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_Multiplayer.png" alt="" class="nav-icon"><span class="nav-text">Multiplayer</span></a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-[8px] text-[#ffffff]"><img src="./assets/images/icons/icon_Others.png" alt="" class="nav-icon"><span class="nav-text">Others</span></a>
      </nav>
      <!-- Bottom Side Banners -->
      <div class="px-2 pb-4 space-y-2 sidebar-banners-area">
        <div class="rounded-lg relative overflow-hidden cursor-pointer shadow-md transition transform hover:scale-[1.02]">
            <img src="./assets/images/sidebar_banner_1.png" class="w-full h-auto block">
        </div>
        <div class="rounded-lg relative overflow-hidden cursor-pointer shadow-md transition transform hover:scale-[1.02]">
            <img src="./assets/images/sidebar_banner_2.png" class="w-full h-auto block">
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 lg: min-h-screen flex flex-col overflow-x-hidden" style="margin-left: var(--sidebar-w, 188px); transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
      <!-- Top Bar -->
      <!-- Top Bar -->
      <header class="flex justify-between md:justify-end items-center p-4 lg:px-8 pt-5">
        <button class="hamburger-btn w-8 h-8 rounded-lg bg-[#242756] items-center justify-center lg:hidden mr-auto" onclick="toggleSidebar()"><span class="text-white text-sm">☰</span></button>
        <div class="flex items-center gap-3">
          <!-- Falcon (道具獵鷹) -->
          <div class="flex items-center gap-1.5 bg-[#1b1c3b]/80 border border-[#3b3e6d]/50 rounded-full pl-1.5 pr-1 py-1 shadow-inner">
            <div class="w-5 h-5 rounded-full bg-gradient-to-b from-[#2ed573] to-[#20a355] flex items-center justify-center border border-[#4dff99] shadow-[0_0_8px_rgba(46,213,115,0.6)]">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" class="w-3.5 h-3.5 drop-shadow"><path d="M12 2c-5.5 0-10 4.5-10 10s4.5 10 10 10 10-4.5 10-10-4.5-10-10-10zm2 14h-4v-2h4v2zm0-4h-4v-4h4v4z"/></svg>
            </div>
            <span class="text-[14px] font-bold text-white tracking-wide ml-0.5">1.354k</span>
            <button class="w-[20px] h-[20px] rounded-full bg-[#4d4ee1] hover:bg-[#5d5ef0] transition flex items-center justify-center text-white text-[14px] font-bold shadow-md ml-1 pb-0.5 border border-[#6d6eff]/60">+</button>
          </div>
          <!-- Diamond -->
          <div class="flex items-center gap-1.5 bg-[#1b1c3b]/80 border border-[#3b3e6d]/50 rounded-full pl-1.5 pr-1 py-1 shadow-inner">
            <div class="w-5 h-5 flex items-center justify-center drop-shadow-[0_0_6px_rgba(214,183,255,0.6)]">
              <span class="text-[17px] -mt-0.5 text-[#d6b7ff]">💎</span>
            </div>
            <span class="text-[14px] font-bold text-white tracking-wide ml-0.5">1.334k</span>
            <button class="w-[20px] h-[20px] rounded-full bg-[#4d4ee1] hover:bg-[#5d5ef0] transition flex items-center justify-center text-white text-[14px] font-bold shadow-md ml-1 pb-0.5 border border-[#6d6eff]/60">+</button>
          </div>
          <!-- Coin -->
          <div class="flex items-center gap-1.5 bg-[#1b1c3b]/80 border border-[#3b3e6d]/50 rounded-full pl-1.5 pr-1 py-1 shadow-inner">
            <div class="w-5 h-5 flex items-center justify-center drop-shadow-[0_0_6px_rgba(255,186,58,0.6)]">
              <span class="text-[18px] -mt-0.5 tracking-tighter">🪙</span>
            </div>
            <span class="text-[14px] font-bold text-white tracking-wide ml-0.5">1.354k</span>
            <button class="w-[20px] h-[20px] rounded-full bg-[#4d4ee1] hover:bg-[#5d5ef0] transition flex items-center justify-center text-white text-[14px] font-bold shadow-md ml-1 pb-0.5 border border-[#6d6eff]/60">+</button>
          </div>
          <!-- Gear / Settings -->
          <button class="w-[34px] h-[34px] rounded-[10px] bg-[#4d4ee1] hover:bg-[#5d5ef0] transition flex items-center justify-center shadow-lg ml-1.5 border border-[#6d6eff]/50">
            <span class="text-[18px] text-white">⚙️</span>
          </button>
        </div>
      </header>
              <!-- Content -->
      <div class="flex-1 p-4 md:p-6 lg:px-8 space-y-4 mb-10 overflow-x-hidden">

        <!-- Breadcrumb -->
        <div class="text-[13px] text-[#8a8db9] font-bold tracking-wide flex items-center gap-1.5 -mb-2">
          <a href="index.html" class="hover:text-white transition">Home</a>
          <span class="opacity-50">></span>
          <span class="text-[#8a8db9]">Shop</span>
        </div>

        <!-- Title -->
        <h1 class="text-[26px] font-black tracking-wide text-white drop-shadow-md mb-2">Shop</h1>

        <!-- Hero Banner -->
        <div class="w-full relative rounded-[20px] overflow-hidden flex flex-col items-center">
          <img src="./images/左下角BANNER1 (1).png" alt="Featured Shop Item" class="w-full h-[200px] md:h-[260px] object-cover bg-[#242756] shadow-lg border border-[#3b3e6d]/50">
          
          <!-- Pagination Dots -->
          <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex items-center justify-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-[#1b1e42]/80 backdrop-blur"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-[#1b1e42]/80 backdrop-blur"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-[#4d4ee1] shadow-[0_0_8px_rgba(77,78,225,0.8)]"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-[#1b1e42]/80 backdrop-blur"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-[#1b1e42]/80 backdrop-blur"></span>
          </div>
        </div>

        <!-- Primary Tabs -->
        <div class="flex items-center gap-6 md:gap-8 mt-4 border-b border-white/5 pb-[10px] overflow-x-auto custom-scrollbar whitespace-nowrap">
          <a href="#" class="text-white text-[15px] font-bold border-b-2 border-white pb-[10px] -mb-[11px] relative flex-shrink-0">Star Shop</a>
          <a href="#" class="text-[#8a8db9] text-[15px] font-bold hover:text-white transition flex-shrink-0">Daily Deal</a>
          <a href="#" class="text-[#8a8db9] text-[15px] font-bold hover:text-white transition flex-shrink-0">Best Value</a>
          <a href="#" class="text-[#8a8db9] text-[15px] font-bold hover:text-white transition flex-shrink-0">Premium</a>
          <a href="#" class="text-[#8a8db9] text-[15px] font-bold hover:text-white transition flex-shrink-0">Top-Up</a>
        </div>

        <!-- Main Shop Panel -->
        <div class="bg-[#242756] rounded-[24px] p-5 shadow-inner border border-[#3b3e6d]/40 min-h-[500px]">
          
          <!-- Secondary Pill Tabs -->
          <div class="flex flex-wrap items-center gap-3 mb-6">
            <button class="bg-[#4d4ee1] rounded-full px-5 py-1.5 text-white text-[13px] font-extrabold shadow-md tracking-wider border border-[#5d5ef0]">Limited Shop</button>
            <button class="bg-[#1b1d42] rounded-full px-5 py-1.5 text-[#8a8db9] text-[13px] font-bold border border-[#3b3e6d]/50 hover:text-white hover:bg-[#232650] transition tracking-wider">Dimaond Shop</button>
            <button class="bg-[#1b1d42] rounded-full px-5 py-1.5 text-[#8a8db9] text-[13px] font-bold border border-[#3b3e6d]/50 hover:text-white hover:bg-[#232650] transition tracking-wider">Coin Shop</button>

              <div class="flex items-center gap-2 ml-auto">

            <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-7 xl:grid-cols-10 gap-x-2.5 gap-y-4" id="diamondGrid">
              <!-- JS injected -->
            </div>
          </div>

        </div>

      </div>
    </main>
  </div>

  <script>
    function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('open')}

    // Card UI Generator
    function createCard(type) {
      let btnClass = '';
      let btnText = '';
      if (type === 'free') {
        btnClass = 'bg-gradient-to-b from-[#2ed573] to-[#20a355] text-white';
        btnText = 'FREE';
      } else if (type === 'star') {
        btnClass = 'bg-gradient-to-b from-[#4d4ee1] to-[#2a2c53] text-white border border-[#5d5ef0] shadow-[inset_0_2px_4px_rgba(255,255,255,0.2)]';
        btnText = '<span class="text-[12px] text-[#ffba3a] drop-shadow-sm mr-1">⭐</span> 10000';
      } else {
        btnClass = 'bg-gradient-to-b from-[#ffba3a] to-[#d97c00] text-[#5c3000] shadow-[inset_0_2px_4px_rgba(255,255,255,0.4)]';
        btnText = 'NT. 9999';
      }
      
      return `
      <div class="bg-gradient-to-b from-[#3b3e7a] to-[#252857] rounded-[18px] flex flex-col items-center pt-3 pb-2 px-2 border-t-[1.5px] border-[#6b6eb3] shadow-lg relative overflow-hidden group cursor-pointer hover:-translate-y-1 transition-transform">
        <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>

        <span class="text-white text-[12.5px] font-extrabold tracking-wide drop-shadow-sm block mb-1">Item name</span>
        
        <div class="flex flex-col items-center justify-center h-[55px]">
          <span class="text-[32px] drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] leading-none -mb-1">🪙</span>
        </div>

        <span class="text-[#ffba3a] text-[15px] font-black drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] mt-1" style="-webkit-text-stroke: 0.3px rgba(0,0,0,0.5);">6,800k</span>
        
        <div class="w-[85%] h-[1px] bg-white/10 mx-auto my-1.5"></div>
        
        <span class="text-white/90 text-[11px] font-black tracking-widest mb-2">1/1</span>
        
        <button class="w-full h-[32px] rounded-[10px] flex items-center justify-center font-black text-[13px] tracking-wide ${btnClass}">
          ${btnText}
        </button>
      </div>
      `;
    }

    // Populate Limited Shop
    const limitedItems = ['free','free','free','star','star','star','nt','nt','free','free'];
    const limitedGrid = document.getElementById('limitedGrid');
    limitedItems.forEach(type => {
      limitedGrid.innerHTML += createCard(type);
    });

    // Populate Diamond Shop
    const diamondItems = ['free','free','free','star','star'];
    const diamondGrid = document.getElementById('diamondGrid');
    diamondItems.forEach(type => {
      diamondGrid.innerHTML += createCard(type);
    });
  </script>
</body>
</html>
